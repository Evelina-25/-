<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="avt.css">
    <title>Авторизация</title>
</head>
<body>
    <div class="wrapper">
        <div class="wrapper-form">
            <h1 class="title">Авторизация</h1>
            <form class="reg-form" autocomplete="off"> 
                <input type="text" name="username" class="reg-input" placeholder="Имя" autocomplete="off">
                <input type="password" name="password" class="reg-input" placeholder="Пароль" autocomplete="new-password">
                <button type="submit" class="reg-sub">Войти</button> 
            </form>
           <div class="auth-link">
            <p>Ещё не зарегистрированы?</p>
            <a href="../Reg/reg.html" target="_blank" class="avt">Регистрация</a>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
