<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Клиент</title>
</head>
<body>
  <h1 id="formTitle">Новый клиент</h1>
  <form id="clientForm">
    <input type="text" name="name" placeholder="ФИО" required><br>
    <input type="text" name="passport" placeholder="Паспорт" required><br>
    <input type="text" name="phone" placeholder="Телефон"><br>
    <input type="email" name="email" placeholder="Email"><br>
    <input type="date" name="birthdate" placeholder="Дата рождения" required><br>
    <button type="submit">Сохранить</button>
    <button type="button" onclick="window.location.href='clients.html'">Отмена</button>
  </form>

  <script src="../Clients/client-form.js"></script>
</body>
</html>
